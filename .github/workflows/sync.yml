name: Create Neon Twin
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PG_VERSION: '16'

jobs:
  sync-db:
    runs-on: ubuntu-22.04
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ACCOUNT_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get RDS Info
        id: rds_info
        run: |
          # Get RDS endpoint from SSM to identify instance
          DB_IDENTIFIER=$(aws ssm get-parameter --name '/rds/db-endpoint' --query 'Parameter.Value' --output text | cut -d'.' -f1)
          echo "DB identifier: $DB_IDENTIFIER"
          
          # Get security group ID from RDS instance
          SG_ID=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_IDENTIFIER" \
            --query 'DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId' \
            --output text)
          
          echo "Found Security Group ID: $SG_ID"
          echo "SECURITY_GROUP_ID=$SG_ID" >> $GITHUB_ENV

      - name: Install Required Tools
        run: |
          # Install PostgreSQL client
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-${{ env.PG_VERSION }} netcat-openbsd

      - name: Add Runner IP and Test Connection
        id: ip_setup
        run: |
          # Get runner's IP
          RUNNER_IP=$(curl -s ifconfig.me)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          
          # Add to security group
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ env.SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 5432 \
            --cidr "${RUNNER_IP}/32"
          
          echo "Added IP ${RUNNER_IP} to security group"
          
          # Get RDS endpoint
          DB_HOST=$(aws ssm get-parameter --name '/rds/db-endpoint' --query 'Parameter.Value' --output text)
          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV
          
          # Wait for security group changes to propagate and test connection
          echo "Waiting for security group changes to propagate..."
          for i in {1..10}; do
            if nc -zv "$DB_HOST" 5432 2>/dev/null; then
              echo "Connection successful!"
              break
            fi
            echo "Attempt $i: Waiting for connection..."
            sleep 10
          done

      - name: Get Database Credentials
        run: |
          DB_USER=$(aws ssm get-parameter --name '/rds/db-username' --query 'Parameter.Value' --output text)
          DB_PASS=$(aws ssm get-parameter --name '/rds/db-password' --with-decryption --query 'Parameter.Value' --output text)
          
          echo "DB_USER=$DB_USER" >> $GITHUB_ENV
          echo "DB_PASS=$DB_PASS" >> $GITHUB_ENV

      - name: Test Database Connection
        run: |
          echo "Testing database connection..."
          PGPASSWORD="${{ env.DB_PASS }}" psql \
            -h "${{ env.DB_HOST }}" \
            -U "${{ env.DB_USER }}" \
            -d employees \
            -c "SELECT 1" || exit 1

      - name: Dump RDS Database
        run: |
          echo "Starting database dump..."
          PGPASSWORD="${{ env.DB_PASS }}" pg_dump \
            -h "${{ env.DB_HOST }}" \
            -U "${{ env.DB_USER }}" \
            -d employees \
            -Fc -f dump.dump
          
          echo "Database dump completed"

      - name: Restore to Neon
        run: |
          echo "Starting restore to Neon..."
          pg_restore \
            -d "${{ secrets.DEV_DATABASE_URL }}" \
            --clean --no-owner --no-acl --if-exists \
            dump.dump
          
          echo "Restore to Neon completed"

      - name: Remove Runner IP
        if: always()
        run: |
          echo "Removing IP ${RUNNER_IP} from security group..."
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ env.SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 5432 \
            --cidr ${RUNNER_IP}/32
          
          echo "Removed IP from security group"

      - name: Cleanup
        if: always()
        run: |
          rm -f dump.dump
          echo "Cleanup completed"
