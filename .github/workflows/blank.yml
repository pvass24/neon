name: Deploy to AWS via OIDC

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ACCOUNT_ROLE }}
          aws-region: us-west-2

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Deploy to RDS
        run: |
          # Example AWS CLI commands
          echo "Describing RDS instances for verification..."
          aws rds describe-db-instances --query "DBInstances[].DBInstanceIdentifier" --region=us-west-2

          echo "Connecting to the target RDS database to ensure access works..."
          export DB_USERNAME=postgres
          export DB_PASSWORD=ilovene0n
          export DB_ENDPOINT=$(aws ssm get-parameter --name /rds/db-endpoint --query 'Parameter.Value' --output text)

          echo "Database Endpoint: $DB_ENDPOINT"
          psql "host=$DB_ENDPOINT user=$DB_USERNAME password=$DB_PASSWORD dbname=employees" -c '\dt'
