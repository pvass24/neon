name: Create Neon Twin
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PG_VERSION: '16'
  LOCAL_PORT: '15432'

jobs:
  sync-db:
    runs-on: ubuntu-22.04
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ACCOUNT_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get RDS Info
        id: rds_info
        run: |
          # Get RDS endpoint from SSM to identify instance
          DB_IDENTIFIER=$(aws ssm get-parameter --name '/rds/db-endpoint' --query 'Parameter.Value' --output text | cut -d'.' -f1)
          echo "DB identifier: $DB_IDENTIFIER"
          
          # Get security group ID from RDS instance
          SG_ID=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_IDENTIFIER" \
            --query 'DBInstances[0].VpcSecurityGroups[0].VpcSecurityGroupId' \
            --output text)
          
          echo "Found Security Group ID: $SG_ID"
          echo "SECURITY_GROUP_ID=$SG_ID" >> $GITHUB_ENV

      - name: Add Runner IP to Security Group
        id: ip_setup
        run: |
          RUNNER_IP=$(curl -s ifconfig.me)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ env.SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 5432 \
            --cidr "${RUNNER_IP}/32"
          
          echo "Added IP ${RUNNER_IP} to security group"

      - name: Install Required Tools
        run: |
          # Install SSM plugin
          curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb
          rm session-manager-plugin.deb
          
          # Install netcat
          sudo apt-get update
          sudo apt-get install -y netcat
          
          # Install PostgreSQL client
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-${{ env.PG_VERSION }}

      - name: Start Port Forwarding
        run: |
          # Get RDS details from SSM
          DB_HOST=$(aws ssm get-parameter --name '/rds/db-endpoint' --query 'Parameter.Value' --output text)
          DB_USER=$(aws ssm get-parameter --name '/rds/db-username' --query 'Parameter.Value' --output text)
          DB_PASS=$(aws ssm get-parameter --name '/rds/db-password' --with-decryption --query 'Parameter.Value' --output text)
          
          echo "DB_HOST=$DB_HOST" >> $GITHUB_ENV
          echo "DB_USER=$DB_USER" >> $GITHUB_ENV
          echo "DB_PASS=$DB_PASS" >> $GITHUB_ENV
          
          # Start SSM session with port forwarding
          aws ssm start-session \
            --target ${{ env.EC2_INSTANCE_ID }} \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters "{\"host\":[\"$DB_HOST\"],\"portNumber\":[\"5432\"], \"localPortNumber\":[\"${{ env.LOCAL_PORT }}\"]}" > ssm_output.log 2>&1 &
          
          # Wait for port forwarding to establish
          echo "Waiting for port forwarding to be established..."
          attempt=1
          max_attempts=30
          
          until nc -z localhost ${{ env.LOCAL_PORT }} || [ $attempt -gt $max_attempts ]
          do
            echo "Attempt $attempt of $max_attempts"
            cat ssm_output.log
            sleep 5
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "Failed to establish port forwarding"
            cat ssm_output.log
            exit 1
          fi
          
          echo "Port forwarding successfully established"
          ps aux | grep ssm

      - name: Dump RDS Database
        run: |
          echo "Starting database dump..."
          PGPASSWORD="${{ env.DB_PASS }}" pg_dump \
            -h localhost \
            -p ${{ env.LOCAL_PORT }} \
            -U "${{ env.DB_USER }}" \
            -d employees \
            -Fc -f dump.dump
          
          echo "Database dump completed"

      - name: Restore to Neon
        run: |
          echo "Starting restore to Neon..."
          pg_restore \
            -d "${{ secrets.DEV_DATABASE_URL }}" \
            --clean --no-owner --no-acl --if-exists \
            dump.dump
          
          echo "Restore to Neon completed"

      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up..."
          pkill -f "ssm start-session" || true
          
          # Remove IP from security group
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ env.SECURITY_GROUP_ID }}" \
            --protocol tcp \
            --port 5432 \
            --cidr ${RUNNER_IP}/32
          
          rm -f dump.dump
          echo "Cleanup completed"
